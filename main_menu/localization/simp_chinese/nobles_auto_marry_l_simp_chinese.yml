l_simp_chinese:
 noble_auto_marry.1.t: "[target_male.GetNameWithNoTooltip]与[target_female.GetNameWithNoTooltip]成婚"
 noble_auto_marry.1.d: "经过数月的筹划和交往，[target_male.GetName]与[target_female.GetName]相互联姻，这是在[target_male.GetDynasty.GetName]家族和[target_female.GetDynasty.GetName]家族之间又建立了一座桥梁，人们期望他们能够延续贵族血脉，以不辜负他们血统的方式抚养下一代。"
 noble_auto_marry.1.a: "我们向新婚夫妇致以祝贺"
 noble_auto_marry.1.b: "让贵族们自己庆贺吧。"
 hide_marriage_events.tt: "你将不再收到贵族联姻的事件。"
 noble_auto_marry.2.t: "[unmarried_royal.GetNameWithNoTooltip]等待[unmarried_royal.GetHerHis]的另一半"
 noble_auto_marry.2.d: "[unmarried_royal.GetName]已向[ROOT.GetCountry.GetGovernment.GetRuler.GetName]提出自己至今未婚的问题，并对表达了忧虑。"
 noble_auto_marry.2.a: "我们一定会为[unmarried_royal.GetNameWithNoTooltip]找到合适的人选"
 noble_auto_marry.2.b: "[unmarried_royal.GetNameWithNoTooltip]可从我们的贵族阶层中自由选择心仪之人。"
 unmarried_royal_will_find_suitable_spouse.tt: "[unmarried_royal.GetName]将自行选择伴侣，并在明年内与一位当地贵族联姻。"
 noble_auto_marry.3.t: "[unmarried_royal.GetNameWithNoTooltip]与[target_suitor.GetNameWithNoTooltip]成婚"
 noble_auto_marry.3.d: "经过数月的筹划和交往，[unmarried_royal.GetName]与[target_suitor.GetName]相互联姻，这是在[unmarried_royal.GetDynasty.GetName]家族和[target_suitor.GetDynasty.GetName]家族之间又建立了一座桥梁，人们期望他们能够延续贵族血脉，以不辜负他们血统的方式抚养下一代。"
 noble_auto_marry.3.a: "我们向新婚夫妇致以祝贺"
 auto_marry_reminder_sent: "已询问联姻事宜"
 auto_marry_reminder_sent_desc: "该角色曾主动向君主询问联姻可能性"
 noble_auto_marry.63.t: "宫廷婚姻政策"
 noble_auto_marry.63.d: "理论上[ROOT.GetCountry.GetGovernment.GetRulerTitle]有权批准或拒绝宫廷成员之间的任何包办婚姻。然而在实践中，要完全控制宫廷内的关系往往既困难又不切实际。\n\n当前：[ROOT.GetCountry.Custom('get_noble_auto_marry_disabled')]\n\n[ROOT.GetCountry.Custom('get_noble_auto_marry_message_settings')]\n\n[ROOT.GetCountry.Custom('get_noble_auto_marry_pop_limit')]\n\n当前的宫廷婚姻政策是[ROOT.GetCountry.Custom('get_nobles_auto_marry_eligibility_settings')]\n\n目前[ROOT.GetCountry.Custom('get_noble_only_auto_marry_setting')]#color_yellow [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]#![ROOT.GetCountry.Custom('get_burghers_auto_marry_setting')][ROOT.GetCountry.Custom('get_clergy_auto_marry_setting')][ROOT.GetCountry.Custom('get_peasants_auto_marry_setting')][ROOT.GetCountry.Custom('get_dhimmi_auto_marry_setting')][ROOT.GetCountry.Custom('get_tribes_auto_marry_setting')][ROOT.GetCountry.Custom('get_cossacks_auto_marry_setting')]允许在不受监管的情况下结婚。"
 noble_auto_marry.63.a: "切换婚姻事件通知"
 noble_auto_marry.63.b: "管理宫廷人口限制"
 noble_auto_marry.63.c: "婚姻资格设置"
 noble_auto_marry.63.e: "管理非贵族婚姻许可"
 noble_auto_marry.63.f: "切换自动婚姻"
 noble_auto_marry.63.g: "AI自动婚姻设置"
 noble_auto_marry.63.i: "切换王室联姻提醒"
 noble_auto_marry.63.j: "文化限制设置"
 noble_auto_marry.63.h: "关闭菜单"
 noble_auto_marry.64.t: "宫廷人口限制"
 noble_auto_marry.64.d: "宫廷只能容纳一定数量的廷臣。我们可以制定一项政策，向所有人传达宫廷无法容纳所有人的信息，从而阻止更多人加入宫廷。\n\n[ROOT.GetCountry.Custom('get_noble_auto_marry_pop_limit')]。当宫廷人数超过人口限制时，将不会发生自动婚姻。"
 noble_auto_marry.64.a: "宣布宫廷欢迎所有人（无人口限制）"
 noble_auto_marry.64.g: "将人口上限设为500"
 noble_auto_marry.64.b: "将人口限制设为200"
 noble_auto_marry.64.c: "将人口限制设为100"
 noble_auto_marry.64.e: "将人口限制设为50"
 noble_auto_marry.64.f: "关闭菜单不做更改"
 noble_auto_marry.65.t: "婚姻资格设置"
 noble_auto_marry.65.d: "国家对宫廷成员婚姻的控制不必是绝对的。我们可以宣布特定的政策，允许符合标准的宫廷成员结婚。\n\n当前，宫廷婚姻政策是[ROOT.GetCountry.Custom('get_nobles_auto_marry_eligibility_settings')]"
 noble_auto_marry.65.a: "廷臣可以自由结婚"
 noble_auto_marry.65.b: "廷臣可以结婚，只要其家族不过于庞大"
 noble_auto_marry.65.c: "廷臣可以结婚，但仅限于为了延续血脉"
 noble_auto_marry.65.e: "关闭菜单不做更改"
 noble_auto_marry.66.t: "非贵族婚姻"
 noble_auto_marry.66.d: "贵族的事务受到严格控制，每个家族都期望能与其地位相称的人联姻。然而，他们并非宫廷的唯一成员，由于其他阶层的成员对结婚的期望较低。如果我们愿意，可以宣布允许非贵族结婚的政策。\n\n目前，[ROOT.GetCountry.Custom('get_noble_only_auto_marry_setting')]#color_yellow [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]#![ROOT.GetCountry.Custom('get_burghers_auto_marry_setting')][ROOT.GetCountry.Custom('get_clergy_auto_marry_setting')][ROOT.GetCountry.Custom('get_peasants_auto_marry_setting')][ROOT.GetCountry.Custom('get_dhimmi_auto_marry_setting')][ROOT.GetCountry.Custom('get_tribes_auto_marry_setting')][ROOT.GetCountry.Custom('get_cossacks_auto_marry_setting')]允许在不受监管的情况下结婚。"
 noble_auto_marry.66.a: "仅限[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]拥有婚姻权"
 noble_auto_marry.66.b: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]的婚姻权限"
 noble_auto_marry.66.c: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]的婚姻权限"
 noble_auto_marry.66.e: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]的婚姻权限"
 noble_auto_marry.66.f: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('dhimmi_estate')]的婚姻权限"
 noble_auto_marry.66.g: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')]的婚姻权限"
 noble_auto_marry.66.h: "切换[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]的婚姻权限"
 noble_auto_marry.66.i: "允许所有阶层结婚"
 noble_auto_marry.66.j: "关闭菜单不做更改"
